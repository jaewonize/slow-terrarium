<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬로우 테라리움 — PoC A</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  min-height: 100vh;
  background: #ececec;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  color: #0f0f0f;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
}

/* ── 화면(둥근 카드) — 세로 고정 + 내부 스크롤 ── */
.screen {
  width: 390px;
  height: 820px;
  background: #ffffff;
  border-radius: 44px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.04);
}
.screen-scroll {
  height: 100%;
  overflow-y: scroll;
  overflow-x: hidden;
  padding: 24px 22px 120px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.screen-scroll { scrollbar-color: transparent transparent; }
.screen-scroll::-webkit-scrollbar { width: 0; background: transparent; }
.screen-scroll::-webkit-scrollbar-thumb { background: transparent; }
.screen-scroll::-webkit-scrollbar-track { background: transparent; }

/* 상태바 */
.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
  padding: 0 6px 14px;
  color: #0f0f0f;
}
.statusbar .icons { display: flex; gap: 5px; align-items: center; }
.statusbar svg { display: block; }

/* 헤더 */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 2px 16px;
}
.app-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.reset-btn {
  font-size: 12px;
  color: #0f0f0f;
  border: 1px solid #e3e3e0;
  border-radius: 999px;
  padding: 6px 14px;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
}
.reset-btn:active { background: #f5f5f3; }

/* 점수 4칸 1행 */
.score-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  padding: 0 0 12px;
}
.score-field {
  background: #f5f5f3;
  border: 1px solid transparent;
  border-radius: 16px;
  padding: 12px 4px 10px;
  text-align: center;
  position: relative;
  transition: background 0.2s, border-color 0.2s;
}
.score-field.up { background: #eaf4ec; border-color: #c9e0cf; }
.score-field.down { background: #f7e9e7; border-color: #e8c7c3; }
.score-field input {
  width: 100%;
  border: none; background: transparent;
  text-align: center;
  font-size: 20px; font-weight: 700;
  color: #0f0f0f; outline: none;
  -moz-appearance: textfield;
  cursor: ns-resize;
  font-family: inherit;
  letter-spacing: -0.5px;
}
.score-field input::-webkit-outer-spin-button,
.score-field input::-webkit-inner-spin-button {
  -webkit-appearance: none; margin: 0;
}
.score-label {
  font-size: 10.5px;
  color: #7a7a7a;
  margin-top: 3px;
  font-weight: 500;
}
.led {
  width: 6px; height: 6px; border-radius: 50%;
  position: absolute; top: 8px; right: 10px;
}
.led.green { background: #1D9E75; }
.led.red { background: #E24B4A; }
.led.off { display: none; }

/* 제출 버튼 */
.submit-area { padding: 0 0 14px; }
.submit-btn {
  width: 100%;
  padding: 14px;
  background: #0f0f0f;
  color: #fff;
  border: none;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.submit-btn:active { transform: scale(0.98); }

/* 행성 — 큼직하게 */
.planet-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0 10px;
}
#planet-canvas {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  cursor: grab;
}
#planet-canvas:active { cursor: grabbing; }

.speed-tag {
  margin-top: 14px;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 999px;
  background: #f5f5f3;
  color: #555;
  font-weight: 500;
}
.speed-tag.normal { background: #f5f5f3; color: #555; }
.speed-tag.slow { background: #eaf4ec; color: #1D9E75; }

/* 팝업 */
.popup-area { padding: 4px 0 0; }
.popup-card {
  border-radius: 14px;
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px;
  animation: slideIn 0.25s ease;
  background: #f5f5f3;
}
.popup-card.reward { background: #eaf4ec; }
.popup-card.full { background: #f7e9e7; }
.popup-icon { font-size: 20px; flex-shrink: 0; }
.popup-title { font-size: 13px; font-weight: 600; color: #0f0f0f; }
.popup-desc { font-size: 11px; color: #7a7a7a; margin-top: 1px; }

/* 보관함 */
.inventory-area { padding: 8px 0 4px; }
.inventory-label { font-size: 11px; color: #7a7a7a; margin-bottom: 6px; font-weight: 500; }
.inventory-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  background: #fff;
  border: 1px solid #e3e3e0;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 11px;
  color: #333;
}

/* ── 플로팅 원형 카테고리 버튼 ── */
.floating-cats {
  position: absolute;
  left: 0; right: 0;
  bottom: 22px;
  display: flex;
  justify-content: center;
  gap: 14px;
  padding: 0 24px;
  pointer-events: none;
  z-index: 10;
}
/* 플로팅 버튼 뒤 흰색 페이드 — 스크롤 콘텐츠가 카드 하단에서 부드럽게 사라지게 */
.screen::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 110px;
  background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, #fff 55%);
  pointer-events: none;
  z-index: 5;
  border-bottom-left-radius: 44px;
  border-bottom-right-radius: 44px;
}
.cat-btn {
  width: 58px; height: 58px;
  border-radius: 50%;
  border: none;
  background: #fff;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  pointer-events: auto;
  position: relative;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  transition: transform 0.15s ease;
  font-family: inherit;
}
.cat-btn:hover { transform: translateY(-3px); }
.cat-btn svg { display: block; }
.cat-btn .cat-name {
  font-size: 9px;
  font-weight: 600;
  color: #0f0f0f;
  line-height: 1;
  letter-spacing: -0.2px;
}
.cat-led {
  width: 10px; height: 10px; border-radius: 50%;
  position: absolute; top: 3px; right: 3px;
  border: 2px solid #fff;
}
.cat-led.green { background: #1D9E75; }
.cat-led.red { background: #E24B4A; }
.cat-led.off { display: none; }

.bottom-spacer { height: 82px; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── 보상 테이블 ───
const REWARD_TABLES = {

    { threshold: 20, item: '캥거루',    grade: '희귀',    slots: 2, emoji: '🦘', color: 0xe09060, img: 'assets/move/kangaroo.png' },

    { threshold: 32, item: '독수리',    grade: '에픽',    slots: 3, emoji: '🦅', color: 0xb87848, img: 'assets/move/eagle.png' },
    { threshold: 34, item: '흰여우',    grade: '레전더리', slots: 4, emoji: '🦊', color: 0xe89060, img: 'assets/move/arctic_fox.png' },
    { threshold: 36, item: '사자',      grade: '레전더리', slots: 5, emoji: '🦁', color: 0xe0a030, img: 'assets/move/lion.png' },

    { threshold: 40, item: '블랙팬서',  grade: '신화',    slots: 6, emoji: '🐈‍⬛', color: 0x7868c0, img: 'assets/move/black_panther.png' },
  ],
  rest_tree: [
    { threshold: 2,  item: '갈대',      grade: '일반',    slots: 1, emoji: '🌾', color: 0xd8b840 },
    { threshold: 6,  item: '대나무',    grade: '일반',    slots: 1, emoji: '🎋', color: 0xd8b050 },
    { threshold: 10, item: '바나나 나무', grade: '일반',  slots: 1, emoji: '🌴', color: 0xe8d040 },
    { threshold: 14, item: '파파야 나무', grade: '희귀',  slots: 2, emoji: '🌳', color: 0xe89858 },

    { threshold: 26, item: '소나무',    grade: '에픽',    slots: 3, emoji: '🌲', color: 0xc09060 },
    { threshold: 30, item: '전나무',    grade: '에픽',    slots: 3, emoji: '🌲', color: 0xb07858 },
    { threshold: 34, item: '도토리 나무', grade: '레전더리', slots: 4, emoji: '🌳', color: 0xc89060 },
    { threshold: 38, item: '바오밥 나무', grade: '신화',  slots: 6, emoji: '🌳', color: 0xe07848 },
  ],
  rest_shelter: [
    { threshold: 4,  item: '비치볼',   grade: '일반',    slots: 1, emoji: '⛱', color: 0xe86060 },
    { threshold: 8,  item: '파라솔',   grade: '일반',    slots: 1, emoji: '☂', color: 0xe89048 },
    { threshold: 12, item: '캠프파이어', grade: '일반',  slots: 1, emoji: '🔥', color: 0xe07038 },

const INIT_SCORES = { move: 72, rest: 45, groom: 60, manage: 80 };
let session = {
  prev: { ...INIT_SCORES },
  gains: { move: 0, rest: 0, groom: 0, manage: 0 },
  inventory: [],
  slots_used: 0,
  MAX_SLOTS: 20,
  is_first: true
};

// ─── Three.js 초기화 ───
const canvas = document.getElementById('planet-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(320, 320);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 3.0;

// 조명 — 처음 버전 기반, diffuse만 살짝
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const sun = new THREE.DirectionalLight(0xfff8e8, 0.5);
sun.position.set(4, 3, 4);
scene.add(sun);

// ─── 지구 생성 (매끈한 구체) ───
const seaGeo = new THREE.SphereGeometry(1, 64, 64);
const seaMat = new THREE.MeshPhongMaterial({
  color: 0x5b9bd5,
  specular: 0x224466,
  shininess: 8
});
const sea = new THREE.Mesh(seaGeo, seaMat);
scene.add(sea);

// 대기권
const atmMat = new THREE.MeshPhongMaterial({
  color: 0xaad4ff,
  transparent: true, opacity: 0.06,
  side: THREE.FrontSide
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.04, 32, 32), atmMat));

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// ─── 대륙 레이어 ───
const CONTINENTS = [
  { lat: -5,  lon: 20,   r: 0.90, size: 0.42, color: 0x6ab55a, depth: 0.25 }, // 아프리카
  { lat: 52,  lon: 15,   r: 0.98, size: 0.28, color: 0x7ac56a, depth: 0.20 }, // 유럽
  { lat: 40,  lon: 90,   r: 0.90, size: 0.46, color: 0x6ab55a, depth: 0.25 }, // 아시아
  { lat: 45,  lon: -100, r: 0.94, size: 0.38, color: 0x7ac56a, depth: 0.20 }, // 북아메리카
  { lat: -15, lon: -58,  r: 0.98, size: 0.28, color: 0x5aa54a, depth: 0.20 }, // 남아메리카
  { lat: -25, lon: 135,  r: 0.98, size: 0.24, color: 0x8ac56a, depth: 0.20 }, // 호주
  { lat: 0,   lon: 110,  r: 0.98, size: 0.20, color: 0x6ab55a, depth: 0.20 }, // 동남아
];

CONTINENTS.forEach(c => {
  const pos = latLonToVec3(c.lat, c.lon, c.r);
  const geo = new THREE.SphereGeometry(c.size, 32, 32);
  geo.scale(1, 1, c.depth);
  const mat = new THREE.MeshPhongMaterial({
    color: c.color,
    specular: 0x224422,
    shininess: 3
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  const normal = pos.clone().normalize();
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
  sea.add(mesh);
});

// ─── 보상 오브젝트 (납작 디스크 + PNG 이미지 매핑) ───
const rewardObjects = [];
const placedItems = new Set();
const textureLoader = new THREE.TextureLoader();

function generateSlotPositions(n) {
  const positions = [];
  const MIN_DIST = 28; // 최소 이격 각도 (도 단위)
  const MAX_TRIES = 100;

  function angularDist(a, b) {
    // Great Circle Distance — 구면 위 실제 각도 거리
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;
    const x = Math.sin(lat1) * Math.sin(lat2) +
              Math.cos(lat1) * Math.cos(lat2) * Math.cos(dLon);
    return Math.acos(Math.max(-1, Math.min(1, x))) * 180 / Math.PI;
  }

  let attempts = 0;
  while (positions.length < n && attempts < MAX_TRIES * n) {
    attempts++;
    const candidate = {
      lat: (Math.random() * 90) - 45,  // 남위45~북위45
      lon: Math.random() * 360 - 180
    };
    const tooClose = positions.some(p => angularDist(p, candidate) < MIN_DIST);
    if (!tooClose) positions.push(candidate);
  }

  // 부족하면 이격 거리 완화해서 채우기
  while (positions.length < n) {
    positions.push({
      lat: (Math.random() * 90) - 45,
      lon: Math.random() * 360 - 180
    });
  }
  return positions;
}

const SLOT_POSITIONS = generateSlotPositions(20);

function addRewardObject(item, slotIndex) {
  const r = 1.04;
  const pos = SLOT_POSITIONS[slotIndex % SLOT_POSITIONS.length];
  const vec = latLonToVec3(pos.lat, pos.lon, r);

  const orangeColors = [0xe85820, 0xe87830, 0xf0a030]; // 레드 오렌지 / 순수 오렌지 / 옐로 오렌지
  const diskGeo = new THREE.CylinderGeometry(0.10, 0.10, 0.018, 32);
  const diskMat = new THREE.MeshPhongMaterial({
    color: orangeColors[Math.floor(Math.random() * 3)],
    specular: 0x884422,
    shininess: 25
  });
  const disk = new THREE.Mesh(diskGeo, diskMat);
  disk.rotateX(Math.PI / 2);

  const group = new THREE.Group();
  group.add(disk);
  group.position.copy(vec);
  const normal = vec.clone().normalize();
  group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
  sea.add(group);
  rewardObjects.push(group);
}

// ─── 자전 ───
let rotSec = 14;
let rotSpeed = (2 * Math.PI) / (rotSec * 60);
let isDrag = false;
let prevX = 0;

canvas.addEventListener('mousedown', e => { isDrag = true; prevX = e.clientX; });
canvas.addEventListener('mousemove', e => {
  if (!isDrag) return;
  sea.rotation.y += (e.clientX - prevX) * 0.008;
  prevX = e.clientX;
});
canvas.addEventListener('mouseup', () => { isDrag = false; });
canvas.addEventListener('touchstart', e => { isDrag = true; prevX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!isDrag) return;
  sea.rotation.y += (e.touches[0].clientX - prevX) * 0.008;
  prevX = e.touches[0].clientX;
}, { passive: true });
canvas.addEventListener('touchend', () => { isDrag = false; });

function animate() {
  requestAnimationFrame(animate);
  if (!isDrag) sea.rotation.y += rotSpeed;
  renderer.render(scene, camera);
}
animate();

// ─── 자전 속도 매핑 ───
function getRotationInfo(total) {
  if (total < 100)  return { sec: 2,  label: '매우 빠름', cls: '' };
  if (total < 180)  return { sec: 5,  label: '빠름',     cls: '' };
  if (total < 280)  return { sec: 10, label: '조금 빠름', cls: '' };
  if (total <= 320) return { sec: 20, label: '표준',     cls: 'normal' };
  if (total < 350)  return { sec: 35, label: '조금 느림', cls: 'slow' };
  if (total < 380)  return { sec: 55, label: '느림',     cls: 'slow' };
  return             { sec: 90, label: '매우 느림', cls: 'slow' };
}

// ─── 점수 입력 처리 ───
function submitScores() {
  const scores = {
    move:   Math.min(100, Math.max(0, parseInt(document.getElementById('input-move').value)  || 0)),
    rest:   Math.min(100, Math.max(0, parseInt(document.getElementById('input-rest').value)  || 0)),
    groom:  Math.min(100, Math.max(0, parseInt(document.getElementById('input-groom').value) || 0)),
    manage: Math.min(100, Math.max(0, parseInt(document.getElementById('input-manage').value)|| 0)),
  };

  const popupArea = document.getElementById('popup-area');
  popupArea.innerHTML = '';
  const newRewards = [];

  ['move', 'rest', 'groom', 'manage'].forEach(cat => {
    const prev = session.prev[cat];
    const curr = scores[cat];
    const delta = prev !== null ? curr - prev : 0;

    // LED
    const ledStatus = delta >= 2 ? 'green' : delta <= -2 ? 'red' : 'off';
    document.getElementById(`led-${cat}`).className = `led ${ledStatus}`;
    document.getElementById(`field-${cat}`).className = `score-field ${ledStatus === 'green' ? 'up' : ledStatus === 'red' ? 'down' : ''}`;

    // 보상 (상승 시만)
    if (delta >= 2) {
      session.gains[cat] += delta;
      const gain = session.gains[cat];

      // 카테고리별 테이블 선택
      let table = null;
      let label = '';
      if (cat === 'move') { table = REWARD_TABLES.move; label = '잘 움직이기'; }
      else if (cat === 'rest') {
        // 나무/휴식처 랜덤
        table = Math.random() < 0.5 ? REWARD_TABLES.rest_tree : REWARD_TABLES.rest_shelter;
        label = '잘 쉬기';
      }
      // groom: 패널티만 (보상 없음)
      // manage: TBD

      if (table) {
        table.forEach(r => {
          const prevGain = gain - delta;
          if (gain >= r.threshold && prevGain < r.threshold) {
            if (session.slots_used >= session.MAX_SLOTS) {
              showFullPopup();
              return;
            }
            newRewards.push({ ...r, cat, label });
            session.inventory.push({ ...r, cat });
            // 지구에는 같은 아이템 1개만 — 중복이면 보관함에만 추가
            const itemKey = `${cat}_${r.item}`;
            if (!placedItems.has(itemKey)) {
              placedItems.add(itemKey);
              addRewardObject(r, session.slots_used);
              session.slots_used++;
            }
          }
        });
      }
    }
  });

  // 세션 업데이트
  session.prev = { ...scores };
  if (session.is_first) session.is_first = false;

  // 슬롯 차감 로직 — TODO: 감점 시 슬롯 줄어드는 로직 추후 정의
  // 현재는 슬롯 총량 고정(20개)으로 운영
  // 예시 구조:
  // if (delta <= -2 && (cat === 'groom' || cat === 'manage')) {
  //   session.MAX_SLOTS = Math.max(0, session.MAX_SLOTS - slotPenalty);
  // }

  // 자전 속도
  const total = scores.move + scores.rest + scores.groom + scores.manage;
  const rotInfo = getRotationInfo(total);
  rotSec = rotInfo.sec;
  rotSpeed = (2 * Math.PI) / (rotSec * 60);
  const tag = document.getElementById('speed-tag');
  tag.textContent = `합산 ${total}점 · ${rotSec}초 / 회전`;
  tag.className = `speed-tag ${rotInfo.cls}`;

  // 보상 팝업
  newRewards.forEach(r => {
    const el = document.createElement('div');
    el.className = 'popup-card reward';
    el.innerHTML = `
      <div class="popup-icon">${r.emoji}</div>
      <div>
        <div class="popup-title">${r.label} 보상이 지급되었습니다</div>
        <div class="popup-desc">${r.item} · ${r.grade} · 슬롯 ${r.slots}</div>
      </div>`;
    popupArea.appendChild(el);
  });

  // 인벤토리 표시
  updateInventoryUI();
}

function showFullPopup() {
  const popupArea = document.getElementById('popup-area');
  const el = document.createElement('div');
  el.className = 'popup-card full';
  el.innerHTML = `
    <div class="popup-icon">⚠</div>
    <div>
      <div class="popup-title">지구가 가득 찼어요</div>
      <div class="popup-desc">리셋 후 새로 꾸며보세요</div>
    </div>`;
  popupArea.appendChild(el);
}

function updateInventoryUI() {
  const area = document.getElementById('inventory-area');
  const chips = document.getElementById('inventory-chips');
  if (session.inventory.length === 0) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  chips.innerHTML = session.inventory.map(i => `<span class="chip">${i.emoji} ${i.item}</span>`).join('');
}

// ─── 리셋 ───
function resetApp() {
  session = {
    prev: { ...INIT_SCORES },
    gains: { move: 0, rest: 0, groom: 0, manage: 0 },
    inventory: [],
    slots_used: 0,
    MAX_SLOTS: 20,
    is_first: true
  };

  // 보상 오브젝트 제거
  rewardObjects.forEach(m => sea.remove(m));
  rewardObjects.length = 0;
  placedItems.clear();

  ['move','rest','groom','manage'].forEach(cat => {
    document.getElementById(`led-${cat}`).className = 'led off';
    document.getElementById(`field-${cat}`).className = 'score-field';
  });

  document.getElementById('popup-area').innerHTML = '';
  document.getElementById('inventory-area').style.display = 'none';

  // 초기값 복원
  document.getElementById('input-move').value = 72;
  document.getElementById('input-rest').value = 45;
  document.getElementById('input-groom').value = 60;
  document.getElementById('input-manage').value = 80;

  rotSec = 14;
  rotSpeed = (2 * Math.PI) / (rotSec * 60);
  document.getElementById('speed-tag').textContent = '합산 257점 · 14초 / 회전';
  document.getElementById('speed-tag').className = 'speed-tag';
}

// ─── 스크롤로 점수 조작 ───
['move', 'rest', 'groom', 'manage'].forEach(cat => {
  const input = document.getElementById(`input-${cat}`);
  input.addEventListener('wheel', (e) => {
    e.preventDefault();
    const current = parseInt(input.value) || 0;
    const delta = e.deltaY < 0 ? 1 : -1; // 위로 스크롤 = 증가
    input.value = Math.min(100, Math.max(0, current + delta));
  }, { passive: false });
});
</script>
