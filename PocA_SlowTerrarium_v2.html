<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360, initial-scale=1.0">
<title>슬로우 테라리움 — PoC A</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 360px;
  background: #f5f4f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1a1a1a;
  overflow-x: hidden;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 8px;
}
.app-title { font-size: 17px; font-weight: 600; }
.reset-btn {
  font-size: 12px; color: #888;
  border: 0.5px solid #ccc; border-radius: 14px;
  padding: 4px 12px; background: transparent; cursor: pointer;
}
.reset-btn:active { background: #eee; }

.score-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 6px; padding: 0 16px 10px;
}
.score-field {
  background: #fff;
  border: 0.5px solid #e0e0e0;
  border-radius: 10px;
  padding: 8px 4px;
  text-align: center;
  position: relative;
}
.score-field.up { border-color: #1D9E75; background: #f0faf6; }
.score-field.down { border-color: #E24B4A; background: #fff5f5; }
.score-field input {
  width: 100%; border: none; background: transparent;
  text-align: center; font-size: 18px; font-weight: 600;
  color: #1a1a1a; outline: none;
}
.score-label { font-size: 10px; color: #888; margin-top: 2px; }
.led {
  width: 7px; height: 7px; border-radius: 50%;
  position: absolute; top: 4px; right: 4px;
}
.led.green { background: #1D9E75; }
.led.red { background: #E24B4A; }
.led.off { display: none; }

.submit-area { padding: 0 16px 10px; }
.submit-btn {
  width: 100%; padding: 11px;
  background: #1a1a1a; color: #fff;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.submit-btn:active { background: #333; }

.planet-area {
  display: flex; flex-direction: column;
  align-items: center; padding: 4px 20px 4px;
}
#planet-canvas {
  width: 240px; height: 240px;
  border-radius: 50%; cursor: grab;
  border: 1px solid #e0ddd8;
}
#planet-canvas:active { cursor: grabbing; }

.speed-tag {
  margin-top: 8px; font-size: 12px;
  padding: 4px 14px; border-radius: 20px;
  background: #fff3e0; color: #e65100;
  border: 0.5px solid #ffcc80;
}
.speed-tag.normal { background: #f5f4f0; color: #888; border-color: #ddd; }
.speed-tag.slow { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }

.total-score {
  margin-top: 4px; font-size: 12px; color: #aaa;
}

.popup-area { padding: 6px 16px 0; }
.popup-card {
  border-radius: 12px; padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px;
  animation: slideIn 0.25s ease;
}
.popup-card.reward { background: #f0faf6; border: 0.5px solid #1D9E75; }
.popup-card.full { background: #fff8e1; border: 0.5px solid #ffc107; }
.popup-icon { font-size: 22px; flex-shrink: 0; }
.popup-title { font-size: 13px; font-weight: 600; color: #0d5c35; }
.popup-card.full .popup-title { color: #e65100; }
.popup-desc { font-size: 11px; color: #888; margin-top: 1px; }

.inventory-area { padding: 8px 16px 4px; }
.inventory-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.inventory-chips {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.chip {
  background: #fff; border: 0.5px solid #e0e0e0;
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; color: #555;
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0;
  width: 360px; background: #fff;
  border-top: 0.5px solid #e0e0e0;
  padding: 8px 0 18px;
  display: flex; justify-content: space-around;
}
.nav-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.nav-icon-wrap {
  width: 42px; height: 42px; border-radius: 50%;
  background: #f5f4f0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.nav-led {
  width: 8px; height: 8px; border-radius: 50%;
  position: absolute; top: 2px; right: 2px;
  border: 1.5px solid #f5f4f0;
}
.nav-led.green { background: #1D9E75; }
.nav-led.red { background: #E24B4A; }
.nav-led.off { display: none; }
.nav-label { font-size: 10px; color: #888; }

.spacer { height: 80px; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
  <span class="app-title">슬로우 테라리움</span>
  <button class="reset-btn" onclick="resetApp()">리셋</button>
</div>

<div class="score-row">
  <div class="score-field" id="field-move">
    <div class="led off" id="led-move"></div>
    <input type="number" id="input-move" min="0" max="100" value="72">
    <div class="score-label">움직이기</div>
  </div>
  <div class="score-field" id="field-rest">
    <div class="led off" id="led-rest"></div>
    <input type="number" id="input-rest" min="0" max="100" value="45">
    <div class="score-label">쉬기</div>
  </div>
  <div class="score-field" id="field-groom">
    <div class="led off" id="led-groom"></div>
    <input type="number" id="input-groom" min="0" max="100" value="60">
    <div class="score-label">가꾸기</div>
  </div>
  <div class="score-field" id="field-manage">
    <div class="led off" id="led-manage"></div>
    <input type="number" id="input-manage" min="0" max="100" value="80">
    <div class="score-label">다스리기</div>
  </div>
</div>

<div class="submit-area">
  <button class="submit-btn" onclick="submitScores()">점수 입력</button>
</div>

<div class="planet-area">
  <canvas id="planet-canvas" width="240" height="240"></canvas>
  <div class="speed-tag" id="speed-tag">합산 257점 · 14초 / 회전</div>
  <div class="total-score" id="total-score"></div>
</div>

<div class="popup-area" id="popup-area"></div>

<div class="inventory-area" id="inventory-area" style="display:none">
  <div class="inventory-label">보관함</div>
  <div class="inventory-chips" id="inventory-chips"></div>
</div>

<div class="spacer"></div>

<div class="bottom-nav">
  <div class="nav-item">
    <div class="nav-icon-wrap">
      <div class="nav-led off" id="nav-led-move"></div>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="4" stroke="#555" stroke-width="1.4"/><path d="M3 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#555" stroke-width="1.4" stroke-linecap="round"/></svg>
    </div>
    <span class="nav-label">움직이기</span>
  </div>
  <div class="nav-item">
    <div class="nav-icon-wrap">
      <div class="nav-led off" id="nav-led-rest"></div>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2C7.7 2 5 4.7 5 8c0 2.5 1.4 4.7 3.5 5.8L8 18h6l-.5-4.2C15.6 12.7 17 10.5 17 8c0-3.3-2.7-6-6-6z" stroke="#555" stroke-width="1.4"/></svg>
    </div>
    <span class="nav-label">쉬기</span>
  </div>
  <div class="nav-item">
    <div class="nav-icon-wrap">
      <div class="nav-led off" id="nav-led-groom"></div>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="16" height="16" rx="3" stroke="#555" stroke-width="1.4"/><path d="M7 11h8M11 7v8" stroke="#555" stroke-width="1.4" stroke-linecap="round"/></svg>
    </div>
    <span class="nav-label">가꾸기</span>
  </div>
  <div class="nav-item">
    <div class="nav-icon-wrap">
      <div class="nav-led off" id="nav-led-manage"></div>
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" stroke="#555" stroke-width="1.4"/><path d="M11 7v4l3 3" stroke="#555" stroke-width="1.4" stroke-linecap="round"/></svg>
    </div>
    <span class="nav-label">다스리기</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── 보상 테이블 ───
const REWARD_TABLES = {

    { threshold: 2,  item: '토끼',      grade: '일반',    slots: 1, emoji: '🐰', color: 0xf4a4a4, img: 'assets/move/rabbit.png' },
    { threshold: 4,  item: '닭',        grade: '일반',    slots: 1, emoji: '🐔', color: 0xf4d4a4, img: 'assets/move/chicken.png' },

    { threshold: 8,  item: '앵무새',    grade: '일반',    slots: 1, emoji: '🦜', color: 0x4ab86e, img: 'assets/move/parrot.png' },
    { threshold: 10, item: '거북이',    grade: '일반',    slots: 1, emoji: '🐢', color: 0x4a8a4a, img: 'assets/move/turtle.png' },
    { threshold: 12, item: '홍학',      grade: '희귀',    slots: 2, emoji: '🦩', color: 0xf48ab4, img: 'assets/move/flamingo.png' },
    { threshold: 14, item: '기린',      grade: '희귀',    slots: 2, emoji: '🦒', color: 0xe8b440, img: 'assets/move/giraffe.png' },
    { threshold: 16, item: '공작',      grade: '희귀',    slots: 2, emoji: '🦚', color: 0x4ab4b4, img: 'assets/move/peacock.png' },
    { threshold: 18, item: '얼룩말',    grade: '희귀',    slots: 2, emoji: '🦓', color: 0x444444, img: 'assets/move/zebra.png' },
    { threshold: 20, item: '캥거루',    grade: '희귀',    slots: 2, emoji: '🦘', color: 0xc89460, img: 'assets/move/kangaroo.png' },
    { threshold: 22, item: '곰',        grade: '에픽',    slots: 3, emoji: '🐻', color: 0x8a5c3a, img: 'assets/move/bear.png' },
    { threshold: 24, item: '황소',      grade: '에픽',    slots: 3, emoji: '🐂', color: 0x6a4a3a, img: 'assets/move/bull.png' },
    { threshold: 26, item: '산양',      grade: '에픽',    slots: 3, emoji: '🐐', color: 0xd0c8b0, img: 'assets/move/ibex.png' },
    { threshold: 28, item: '코끼리',    grade: '에픽',    slots: 3, emoji: '🐘', color: 0x888888, img: 'assets/move/elephant.png' },
    { threshold: 30, item: '치타',      grade: '에픽',    slots: 3, emoji: '🐆', color: 0xe8c040, img: 'assets/move/cheetah.png' },
    { threshold: 32, item: '독수리',    grade: '에픽',    slots: 3, emoji: '🦅', color: 0x8a6040, img: 'assets/move/eagle.png' },
    { threshold: 34, item: '흰여우',    grade: '레전더리', slots: 4, emoji: '🦊', color: 0xf0f0f0, img: 'assets/move/arctic_fox.png' },
    { threshold: 36, item: '사자',      grade: '레전더리', slots: 5, emoji: '🦁', color: 0xe8c060, img: 'assets/move/lion.png' },
    { threshold: 38, item: '팬더',      grade: '레전더리', slots: 5, emoji: '🐼', color: 0x333333, img: 'assets/move/panda.png' },
    { threshold: 40, item: '블랙팬서',  grade: '신화',    slots: 6, emoji: '🐈‍⬛', color: 0x1a1a2e, img: 'assets/move/black_panther.png' },
  ],
  rest_tree: [
    { threshold: 2,  item: '갈대',      grade: '일반',    slots: 1, emoji: '🌾', color: 0xc8b840 },
    { threshold: 6,  item: '대나무',    grade: '일반',    slots: 1, emoji: '🎋', color: 0x4ab86e },
    { threshold: 10, item: '바나나 나무', grade: '일반',  slots: 1, emoji: '🌴', color: 0x4ab840 },
    { threshold: 14, item: '파파야 나무', grade: '희귀',  slots: 2, emoji: '🌳', color: 0x5ab850 },
    { threshold: 18, item: '야자수',    grade: '희귀',    slots: 2, emoji: '🌴', color: 0x3a9840 },
    { threshold: 22, item: '버드나무',  grade: '에픽',    slots: 3, emoji: '🌿', color: 0x4a9860 },
    { threshold: 26, item: '소나무',    grade: '에픽',    slots: 3, emoji: '🌲', color: 0x2a6840 },
    { threshold: 30, item: '전나무',    grade: '에픽',    slots: 3, emoji: '🌲', color: 0x1a5830 },
    { threshold: 34, item: '도토리 나무', grade: '레전더리', slots: 4, emoji: '🌳', color: 0x3a7830 },
    { threshold: 38, item: '바오밥 나무', grade: '신화',  slots: 6, emoji: '🌳', color: 0x6a4820 },
  ],
  rest_shelter: [
    { threshold: 4,  item: '비치볼',   grade: '일반',    slots: 1, emoji: '⛱', color: 0xf44848 },
    { threshold: 8,  item: '파라솔',   grade: '일반',    slots: 1, emoji: '☂', color: 0xf4a840 },
    { threshold: 12, item: '캠프파이어', grade: '일반',  slots: 1, emoji: '🔥', color: 0xe85020 },
    { threshold: 16, item: '해먹',     grade: '희귀',    slots: 2, emoji: '🛌', color: 0xc8a060 },
    { threshold: 20, item: '텐트',     grade: '희귀',    slots: 2, emoji: '⛺', color: 0xe84820 },
    { threshold: 24, item: '오아시스', grade: '에픽',    slots: 3, emoji: '🏝', color: 0x40b8b8 },
    { threshold: 28, item: '온천',     grade: '에픽',    slots: 3, emoji: '♨', color: 0xe87060 },
    { threshold: 32, item: '오두막',   grade: '에픽',    slots: 3, emoji: '🏚', color: 0xa06840 },
    { threshold: 36, item: '이글루',   grade: '레전더리', slots: 4, emoji: '🏔', color: 0xe8f0f8 },
    { threshold: 40, item: '게르',     grade: '신화',    slots: 6, emoji: '🏕', color: 0xa08060 },
  ]
};

// ─── 세션 상태 ───
const INIT_SCORES = { move: 72, rest: 45, groom: 60, manage: 80 };
let session = {
  prev: { ...INIT_SCORES },
  gains: { move: 0, rest: 0, groom: 0, manage: 0 },
  inventory: [],
  slots_used: 0,
  MAX_SLOTS: 20,
  is_first: true
};

// ─── Three.js 초기화 ───
const canvas = document.getElementById('planet-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(240, 240);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0eeea);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 3.0;

// 조명 — 처음 버전 기반, diffuse만 살짝
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const sun = new THREE.DirectionalLight(0xfff8e8, 0.5);
sun.position.set(4, 3, 4);
scene.add(sun);

// ─── 지구 생성 (매끈한 구체) ───
const seaGeo = new THREE.SphereGeometry(1, 64, 64);
const seaMat = new THREE.MeshPhongMaterial({
  color: 0x5b9bd5,
  specular: 0x224466,
  shininess: 8
});
const sea = new THREE.Mesh(seaGeo, seaMat);
scene.add(sea);

// 대기권
const atmMat = new THREE.MeshPhongMaterial({
  color: 0xaad4ff,
  transparent: true, opacity: 0.06,
  side: THREE.FrontSide
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.04, 32, 32), atmMat));

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// ─── 보상 오브젝트 (납작 디스크 + PNG 이미지 매핑) ───
const rewardObjects = [];
const placedItems = new Set();
const textureLoader = new THREE.TextureLoader();

function generateSlotPositions(n) {
  const positions = [];
  const MIN_DIST = 28; // 최소 이격 각도 (도 단위)
  const MAX_TRIES = 100;

  function angularDist(a, b) {
    const dLat = a.lat - b.lat;
    const dLon = a.lon - b.lon;
    return Math.sqrt(dLat * dLat + dLon * dLon);
  }

  let attempts = 0;
  while (positions.length < n && attempts < MAX_TRIES * n) {
    attempts++;
    const candidate = {
      lat: (Math.random() * 90) - 45,  // 남위45~북위45
      lon: Math.random() * 360 - 180
    };
    const tooClose = positions.some(p => angularDist(p, candidate) < MIN_DIST);
    if (!tooClose) positions.push(candidate);
  }

  // 부족하면 이격 거리 완화해서 채우기
  while (positions.length < n) {
    positions.push({
      lat: (Math.random() * 90) - 45,
      lon: Math.random() * 360 - 180
    });
  }
  return positions;
}

const SLOT_POSITIONS = generateSlotPositions(20);

function addRewardObject(item, slotIndex) {
  const r = 1.03;
  const pos = SLOT_POSITIONS[slotIndex % SLOT_POSITIONS.length];
  const vec = latLonToVec3(pos.lat, pos.lon, r);

  const group = new THREE.Group();

  if (item.img) {
    // 이미지 맵핑: PlaneGeometry + 양면 렌더링
    textureLoader.load(
      item.img,
      (tex) => {
        const planeGeo = new THREE.PlaneGeometry(0.28, 0.28);
        const planeMat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          alphaTest: 0.05,
          side: THREE.DoubleSide,
          depthWrite: false
        });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        group.add(plane);
      },
      undefined,
      () => {
        // 이미지 로드 실패 시 색상 디스크 폴백
        const diskGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.018, 32);
        const diskMat = new THREE.MeshPhongMaterial({
          color: item.color || 0xf4c842,
          specular: 0x444444,
          shininess: 20
        });
        group.add(new THREE.Mesh(diskGeo, diskMat));
      }
    );
  } else {
    // 이미지 없으면 색상 디스크
    const diskGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.018, 32);
    const diskMat = new THREE.MeshPhongMaterial({
      color: item.color || 0xf4c842,
      specular: 0x444444,
      shininess: 20
    });
    group.add(new THREE.Mesh(diskGeo, diskMat));
  }

  group.position.copy(vec);
  group.lookAt(0, 0, 0);
  group.rotateX(Math.PI / 2);
  sea.add(group);
  rewardObjects.push(group);
}

// ─── 자전 ───
let rotSec = 14;
let rotSpeed = (2 * Math.PI) / (rotSec * 60);
let isDrag = false;
let prevX = 0;

canvas.addEventListener('mousedown', e => { isDrag = true; prevX = e.clientX; });
canvas.addEventListener('mousemove', e => {
  if (!isDrag) return;
  sea.rotation.y += (e.clientX - prevX) * 0.008;
  prevX = e.clientX;
});
canvas.addEventListener('mouseup', () => { isDrag = false; });
canvas.addEventListener('touchstart', e => { isDrag = true; prevX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!isDrag) return;
  sea.rotation.y += (e.touches[0].clientX - prevX) * 0.008;
  prevX = e.touches[0].clientX;
}, { passive: true });
canvas.addEventListener('touchend', () => { isDrag = false; });

function animate() {
  requestAnimationFrame(animate);
  if (!isDrag) sea.rotation.y += rotSpeed;
  renderer.render(scene, camera);
}
animate();

// ─── 자전 속도 매핑 ───
function getRotationInfo(total) {
  if (total < 100)  return { sec: 2,  label: '매우 빠름', cls: '' };
  if (total < 180)  return { sec: 5,  label: '빠름',     cls: '' };
  if (total < 280)  return { sec: 10, label: '조금 빠름', cls: '' };
  if (total <= 320) return { sec: 20, label: '표준',     cls: 'normal' };
  if (total < 350)  return { sec: 35, label: '조금 느림', cls: 'slow' };
  if (total < 380)  return { sec: 55, label: '느림',     cls: 'slow' };
  return             { sec: 90, label: '매우 느림', cls: 'slow' };
}

// ─── 점수 입력 처리 ───
function submitScores() {
  const scores = {
    move:   Math.min(100, Math.max(0, parseInt(document.getElementById('input-move').value)  || 0)),
    rest:   Math.min(100, Math.max(0, parseInt(document.getElementById('input-rest').value)  || 0)),
    groom:  Math.min(100, Math.max(0, parseInt(document.getElementById('input-groom').value) || 0)),
    manage: Math.min(100, Math.max(0, parseInt(document.getElementById('input-manage').value)|| 0)),
  };

  const popupArea = document.getElementById('popup-area');
  popupArea.innerHTML = '';
  const newRewards = [];

  ['move', 'rest', 'groom', 'manage'].forEach(cat => {
    const prev = session.prev[cat];
    const curr = scores[cat];
    const delta = prev !== null ? curr - prev : 0;

    // LED
    const ledStatus = delta >= 2 ? 'green' : delta <= -2 ? 'red' : 'off';
    document.getElementById(`led-${cat}`).className = `led ${ledStatus}`;
    document.getElementById(`nav-led-${cat}`).className = `nav-led ${ledStatus}`;
    document.getElementById(`field-${cat}`).className = `score-field ${ledStatus === 'green' ? 'up' : ledStatus === 'red' ? 'down' : ''}`;

    // 보상 (상승 시만)
    if (delta >= 2) {
      session.gains[cat] += delta;
      const gain = session.gains[cat];

      // 카테고리별 테이블 선택
      let table = null;
      let label = '';
      if (cat === 'move') { table = REWARD_TABLES.move; label = '잘 움직이기'; }
      else if (cat === 'rest') {
        // 나무/휴식처 랜덤
        table = Math.random() < 0.5 ? REWARD_TABLES.rest_tree : REWARD_TABLES.rest_shelter;
        label = '잘 쉬기';
      }
      // groom: 패널티만 (보상 없음)
      // manage: TBD

      if (table) {
        table.forEach(r => {
          const prevGain = gain - delta;
          if (gain >= r.threshold && prevGain < r.threshold) {
            if (session.slots_used >= session.MAX_SLOTS) {
              showFullPopup();
              return;
            }
            newRewards.push({ ...r, cat, label });
            session.inventory.push({ ...r, cat });
            // 지구에는 같은 아이템 1개만 — 중복이면 보관함에만 추가
            const itemKey = `${cat}_${r.item}`;
            if (!placedItems.has(itemKey)) {
              placedItems.add(itemKey);
              addRewardObject(r, session.slots_used);
              session.slots_used++;
            }
          }
        });
      }
    }
  });

  // 세션 업데이트
  session.prev = { ...scores };
  if (session.is_first) session.is_first = false;

  // 슬롯 차감 로직 — TODO: 감점 시 슬롯 줄어드는 로직 추후 정의
  // 현재는 슬롯 총량 고정(20개)으로 운영
  // 예시 구조:
  // if (delta <= -2 && (cat === 'groom' || cat === 'manage')) {
  //   session.MAX_SLOTS = Math.max(0, session.MAX_SLOTS - slotPenalty);
  // }

  // 자전 속도
  const total = scores.move + scores.rest + scores.groom + scores.manage;
  const rotInfo = getRotationInfo(total);
  rotSec = rotInfo.sec;
  rotSpeed = (2 * Math.PI) / (rotSec * 60);
  const tag = document.getElementById('speed-tag');
  tag.textContent = `합산 ${total}점 · ${rotSec}초 / 회전`;
  tag.className = `speed-tag ${rotInfo.cls}`;

  // 보상 팝업
  newRewards.forEach(r => {
    const el = document.createElement('div');
    el.className = 'popup-card reward';
    el.innerHTML = `
      <div class="popup-icon">${r.emoji}</div>
      <div>
        <div class="popup-title">${r.label} 보상이 지급되었습니다</div>
        <div class="popup-desc">${r.item} · ${r.grade} · 슬롯 ${r.slots}</div>
      </div>`;
    popupArea.appendChild(el);
  });

  // 인벤토리 표시
  updateInventoryUI();
}

function showFullPopup() {
  const popupArea = document.getElementById('popup-area');
  const el = document.createElement('div');
  el.className = 'popup-card full';
  el.innerHTML = `
    <div class="popup-icon">⚠</div>
    <div>
      <div class="popup-title">지구가 가득 찼어요</div>
      <div class="popup-desc">리셋 후 새로 꾸며보세요</div>
    </div>`;
  popupArea.appendChild(el);
}

function updateInventoryUI() {
  const area = document.getElementById('inventory-area');
  const chips = document.getElementById('inventory-chips');
  if (session.inventory.length === 0) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  chips.innerHTML = session.inventory.map(i => `<span class="chip">${i.emoji} ${i.item}</span>`).join('');
}

// ─── 리셋 ───
function resetApp() {
  session = {
    prev: { ...INIT_SCORES },
    gains: { move: 0, rest: 0, groom: 0, manage: 0 },
    inventory: [],
    slots_used: 0,
    MAX_SLOTS: 20,
    is_first: true
  };

  // 보상 오브젝트 제거
  rewardObjects.forEach(m => sea.remove(m));
  rewardObjects.length = 0;
  placedItems.clear();

  ['move','rest','groom','manage'].forEach(cat => {
    document.getElementById(`led-${cat}`).className = 'led off';
    document.getElementById(`nav-led-${cat}`).className = 'nav-led off';
    document.getElementById(`field-${cat}`).className = 'score-field';
  });

  document.getElementById('popup-area').innerHTML = '';
  document.getElementById('inventory-area').style.display = 'none';

  // 초기값 복원
  document.getElementById('input-move').value = 72;
  document.getElementById('input-rest').value = 45;
  document.getElementById('input-groom').value = 60;
  document.getElementById('input-manage').value = 80;

  rotSec = 14;
  rotSpeed = (2 * Math.PI) / (rotSec * 60);
  document.getElementById('speed-tag').textContent = '합산 257점 · 14초 / 회전';
  document.getElementById('speed-tag').className = 'speed-tag';
}
</script>
